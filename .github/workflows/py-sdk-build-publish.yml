name: Build and Publish Python SDK Wheels

on:
  push:
    branches:
      - "python-sdk-*"
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        if: runner.os != 'Linux'
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS cross compilation targets
        if: runner.os == 'macOS'
        run: |
          rustup target add x86_64-apple-darwin
          rustup target add aarch64-apple-darwin

      - name: Install LLVM for Apple Silicon cross-compilation
        if: runner.os == 'macOS'
        run: |
          brew install llvm
          echo "CARGO_TARGET_AARCH64_APPLE_DARWIN_LINKER=$(brew --prefix llvm)/bin/clang" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install maturin cibuildwheel

      - name: Add Cargo to PATH
        if: runner.os == 'Windows'
        run: |
          echo "%USERPROFILE%\.cargo\bin" >> $GITHUB_PATH

      - name: Check Rust target on Windows
        if: runner.os == 'Windows'
        run: rustup target list --installed

      - name: Build wheels
        env:
          CIBW_BUILD: "cp39-*"
          CIBW_BUILD_VERBOSITY: 2
          CIBW_SKIP: "*-musllinux_*"
          CIBW_ARCHS_MACOS: "universal2"
          CIBW_ENVIRONMENT_MACOS: "MACOSX_DEPLOYMENT_TARGET=10.12"
          CIBW_TEST_COMMAND: python -c "import actra; print('actra imported from:', actra.__file__)"
          MATURIN_BUILD_ARGS: "--release --strip"
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_ENVIRONMENT: >
              PYO3_USE_ABI3_FORWARD_COMPATIBILITY=1
              CARGO_NET_GIT_FETCH_WITH_CLI=true
          CIBW_BEFORE_ALL_LINUX: |
              curl https://sh.rustup.rs -sSf | sh -s -- -y
              source $HOME/.cargo/env
              rustup default stable
              rustc --version
              cargo --version

        run: cibuildwheel sdk/python --output-dir wheelhouse

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl


  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install --upgrade pip maturin

      - name: Build sdist
        run: |
          cd sdk/python
          maturin sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: target/wheels/*.tar.gz

      - name: Test sdist install
        run: |
          pip install target/wheels/*.tar.gz
          python -c "import actra; print('actra imported from:', actra.__file__)"

  publish_test:
    name: Publish to Test PyPI
    if: ${{ github.event_name == 'workflow_dispatch'}}
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    #environment: pypi

    #permissions:
    #  id-token: write
    #  contents: read

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: wheelhouse
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          path: sdist
          name: sdist 

      - name: Prepare dist folder
        run: |
          mkdir -p dist
          cp wheelhouse/*.whl dist/ 2>/dev/null || true
          cp sdist/*.tar.gz dist/ 2>/dev/null || true
          ls -la dist/
      
      - name: Check package
        run: |
          pip install twine
          twine check dist/*

      - name: Publish wheels + sdist to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
          repository-url: https://test.pypi.org/legacy/
          password: ${{ secrets.TEST_PYPI_SECRET }}
          packages-dir: dist

  publish:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest

    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: wheelhouse
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          path: sdist
          name: sdist 

      - name: Prepare dist folder
        run: |
          mkdir -p dist
          cp wheelhouse/*.whl dist/ 2>/dev/null || true
          cp sdist/*.tar.gz dist/ 2>/dev/null || true
          ls -la dist/
      
      - name: Check package
        run: |
          pip install twine
          twine check dist/*

      - name: Install built package
        run: |
          pip install dist/*linux*.whl

      - name: Verify tag matches version
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          VERSION=$(python -c "import actra; print(actra.__version__)")
          echo "Tag: $TAG"
          echo "Package version: $VERSION"
          test "$TAG" = "$VERSION"

      - name: Publish package
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist