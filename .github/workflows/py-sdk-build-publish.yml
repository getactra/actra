name: Build and Publish Python SDK Wheels

on:
  push:
    branches:
      - "python-sdk-*"
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Install LLVM for Apple Silicon cross-compilation
        if: runner.os == 'macOS'
        run: |
          brew install llvm
          echo "CARGO_TARGET_AARCH64_APPLE_DARWIN_LINKER=/opt/homebrew/opt/llvm/bin/clang" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install maturin cibuildwheel

      - uses: dtolnay/rust-toolchain@stable
        if: runner.os == 'Windows'

      - name: Add Cargo to PATH
        if: runner.os == 'Windows'
        run: |
          echo "%USERPROFILE%\.cargo\bin" >> $GITHUB_PATH

      - name: Check Rust target on Windows
        if: runner.os == 'Windows'
        run: rustup target list --installed

      - name: Build wheels
        env:
          CIBW_BUILD: "cp39-*"
          CIBW_BUILD_VERBOSITY: 2
          CIBW_SKIP: "*-musllinux_i686"
          CIBW_ARCHS_MACOS: "universal2"
          CIBW_ENVIRONMENT_MACOS: "MACOSX_DEPLOYMENT_TARGET=10.12"
          CIBW_TEST_COMMAND: python -c "import actra; print('actra imported from:', actra.__file__)"
          MATURIN_BUILD_ARGS: "--release --strip"
          CIBW_ENVIRONMENT: "PYO3_USE_ABI3_FORWARD_COMPATIBILITY=1"
        run: cibuildwheel sdk/python --output-dir wheelhouse

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl


  build_sdist:
    name: Build source distribution
    needs: build_wheels
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install maturin

      - name: Build sdist
        run: maturin sdist -m bindings/python/Cargo.toml

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: target/wheels/*.tar.gz

      - name: Test wheel install
        run: |
          pip install wheelhouse/*.whl
          python -c "import actra"

  publish_test:
    if: github.ref_type == 'branch'
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}


