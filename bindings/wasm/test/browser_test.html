<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Actra WASM Test</title>
</head>
<body>
  <h1>Actra WASM Browser Test</h1>
  <div id="output"></div>

  <script type="module">
    import { loadActra } from "./loader.js";

    async function run() {
      const wasm = await loadActra();

      console.log("Actra WASM compiler version:", wasm.Actra.compiler_version());
      document.getElementById("output").innerHTML +=
        `<p>Actra WASM compiler version: ${wasm.Actra.compiler_version()}</p>`;
    }

    run();
  </script>
</body>
</html>
